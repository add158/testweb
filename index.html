<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>王林 - Lamborghini Veneno</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #ffffff;
      padding: 2rem;
    }
    .container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4rem;
      max-width: 1100px;
      width: 100%;
      padding: 2rem;
      flex-wrap: wrap;
    }
    .car-image {
      flex: 1 1 500px;
      max-width: 600px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(255, 200, 0, 0.08);
    }
    .car-image img {
      width: 100%;
      height: auto;
      display: block;
    }
    .name-section {
      flex: 0 0 auto;
      text-align: left;
    }
    .name-section h1 {
      font-size: 5rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      color: #f5c518;
      text-shadow: 0 0 40px rgba(245, 197, 24, 0.2);
      line-height: 1;
    }
    .name-section .sub {
      font-size: 1.1rem;
      color: #888;
      margin-top: 0.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
    .meta {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #444;
      text-align: center;
    }
    @media (max-width: 768px) {
      .container { gap: 2rem; flex-direction: column; text-align: center; }
      .name-section { text-align: center; }
      .name-section h1 { font-size: 3rem; }
      .car-image { flex: 1 1 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="car-image">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Lamborghini_Veneno_%2819234557404%29.jpg/1280px-Lamborghini_Veneno_%2819234557404%29.jpg" alt="Lamborghini Veneno" />
    </div>
    <div class="name-section">
      <h1>王林</h1>
      <div class="sub">Lamborghini Veneno</div>
    </div>
  </div>
  <div class="meta">Page built with HTML &hearts;</div>
</body>
</html>
